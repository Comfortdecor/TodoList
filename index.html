<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>
    <!-- ИСПРАВЛЕНО: Надежные ссылки на библиотеки (CDN) -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
    
    <style>
        .container-narrow { max-width: 700px; margin: 0 auto; }
        .main-app-container { min-height: 100vh; background-color: #fff; display: flex; width: 100%; }
        .side-menu { width: 280px; border-right: 1px solid #f0f0f0; transition: all 0.3s ease; background: #f8f9fa; }
        .side-menu.collapsed { width: 75px; }
        .cat-trigger-img { max-width: 40px; cursor: pointer; }
        .nav-link { cursor: pointer; color: #333; padding: 10px 15px; display: block; text-decoration: none; }
        .active-item { background: #e9ecef; border-radius: 8px; font-weight: bold; }
        @media (max-width: 767.98px) { 
            main { padding-top: 75px !important; } 
            .side-menu { display: none !important; } 
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="main-app-container">
            <!-- Кнопка для мобильных -->
            <button v-if="isVisible" class="btn d-md-none position-fixed border-0 bg-transparent p-0" style="top:15px; left:15px; z-index:2000;" @click="toggleCat">
                <img src="CatHeader.png" class="cat-trigger-img">
            </button>

            <!-- Сайдбар для ПК -->
            <header class="d-none d-md-flex flex-column p-3 side-menu" :class="{ 'collapsed': isCollapsed }">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 v-if="!isCollapsed" class="m-0 fw-bold">Меню</h4>
                    <button @click="toggleDesktop" class="btn border-0 p-0">
                        <img src="CatHeader.png" width="30">
                    </button>
                </div>
                <nav class="nav flex-column">
                    <div class="nav-link" :class="{ 'active-item': activeTab === 'today' }" @click="setActive('today')">☀️ <span v-if="!isCollapsed" class="ms-2">Сегодня</span></div>
                    <div class="nav-link" :class="{ 'active-item': activeTab === 'upcoming' }" @click="setActive('upcoming')">📅 <span v-if="!isCollapsed" class="ms-2">На потом</span></div>
                </nav>
            </header>

            <!-- Контент -->
            <main class="flex-grow-1 p-4 p-md-5">
                <div class="container-narrow">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="fw-bold m-0">{{ activeTab === 'today' ? '☀️ Сегодня' : '📅 На потом' }}</h2>
                        <button @click="isAdding = !isAdding" class="btn btn-primary rounded-circle" style="width:45px; height:45px;">{{ isAdding ? '×' : '+' }}</button>
                    </div>

                    <div v-if="isAdding" class="p-4 mb-4 border rounded-4 shadow-sm">
                        <input v-model="newTaskText" class="form-control mb-3 border-0 fs-5 shadow-none" placeholder="Что нужно сделать?">
                        <button @click="saveTask" class="btn btn-primary w-100 rounded-pill" :disabled="!newTaskText.trim()">Добавить</button>
                    </div>

                    <div class="todo-list">
                        <div v-for="todo in filteredTodos" :key="todo.id" class="d-flex align-items-center p-3 mb-2 rounded-4 border bg-white">
                            <input type="checkbox" v-model="todo.done" class="form-check-input me-3">
                            <div class="flex-grow-1" :class="{ 'text-decoration-line-through text-muted': todo.done }">{{ todo.text }}</div>
                            <button @click="deleteTask(todo.id)" class="btn text-danger">×</button>
                        </div>
                        <div v-if="filteredTodos.length === 0" class="text-center mt-5 text-muted fs-5">Пока задач нет 🐾</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ VUE
        const { createApp, ref, computed, watch } = Vue
        createApp({
            setup() {
                const activeTab = ref('today')
                const isCollapsed = ref(false)
                const isVisible = ref(true)
                const isAdding = ref(false)
                const newTaskText = ref('')
                const todos = ref(JSON.parse(localStorage.getItem('my-todos')) || [])

                watch(todos, (val) => {
                    localStorage.setItem('my-todos', JSON.stringify(val))
                }, { deep: true })

                const filteredTodos = computed(() => {
                    return todos.value.filter(t => t.category === activeTab.value)
                })

                const saveTask = () => {
                    if (!newTaskText.value.trim()) return
                    todos.value.push({ 
                        id: Date.now(), 
                        text: newTaskText.value, 
                        category: activeTab.value, 
                        done: false 
                    })
                    newTaskText.value = ''
                    isAdding.value = false
                }

                const deleteTask = (id) => {
                    todos.value = todos.value.filter(t => t.id !== id)
                }

                const setActive = (t) => { 
                    activeTab.value = t
                    isAdding.value = false 
                }

                const toggleDesktop = () => isCollapsed.value = !isCollapsed.value
                const toggleCat = () => isVisible.value = false

                return { 
                    activeTab, isCollapsed, isVisible, isAdding, newTaskText, 
                    filteredTodos, saveTask, deleteTask, setActive, toggleDesktop, toggleCat 
                }
            }
        }).mount('#app')
    </script>
</body>
</html>

</html>
